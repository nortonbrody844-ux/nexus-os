<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS OS • Real-Time Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        :root { --tw-color-primary: #00f0ff; }
        body { font-family: 'Inter', system_ui, sans-serif; background: radial-gradient(circle at center, #0a0a1f 0%, #000000 100%); }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .header-gradient { background: linear-gradient(90deg, #111111, #1a1a2e); }
        .neural-bg { background: url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat fixed; filter: brightness(0.7) contrast(1.2); }
        .room-content { display: none; }
        .active-room { display: block; }
        .swarm-log { font-size: 0.75rem; line-height: 1.3; }
        .article-card { transition: all 0.2s; }
        .article-card:hover { transform: scale(1.03); box-shadow: 0 0 15px rgba(0,240,255,0.4); }
        .ticker { animation: marquee 60s linear infinite; white-space: nowrap; overflow: hidden; }
        @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        .market-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .market-card:hover { transform: translateY(-2px); box-shadow: 0 0 25px -5px rgb(34 211 238); }
    </style>
</head>
<body class="text-white min-h-screen neural-bg overflow-x-hidden">

    <!-- HEADER (unchanged) -->
    <header class="header-gradient border-b border-cyan-500/30 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-2xl flex items-center justify-center text-xl font-bold">N</div>
                <h1 class="logo-font text-3xl tracking-tighter">NEXUS OS</h1>
            </div>
            <button onclick="toggleHamburger()" class="md:hidden text-4xl leading-none">☰</button>
            <nav class="hidden md:flex gap-x-8 text-lg font-medium">
                <a onclick="selectRoom(0)" class="hover:text-cyan-400 cursor-pointer">SUMMARY</a>
                <a onclick="selectRoom(1)" class="hover:text-cyan-400 cursor-pointer">WAR ROOM</a>
                <a onclick="selectRoom(2)" class="hover:text-cyan-400 cursor-pointer">PRESS</a>
                <a onclick="selectRoom(3)" class="hover:text-cyan-400 cursor-pointer">CONSPIRACY</a>
                <a onclick="selectRoom(4)" class="hover:text-cyan-400 cursor-pointer">MARKET</a>
                <a onclick="selectRoom(5)" class="hover:text-cyan-400 cursor-pointer">ACCOUNT</a>
                <a onclick="selectRoom(6)" class="hover:text-cyan-400 cursor-pointer">PREDICTION</a>
                <a onclick="selectRoom(7)" class="hover:text-cyan-400 cursor-pointer">VAULT</a>
            </nav>
            <div class="flex items-center gap-x-4">
                <div class="flex items-center bg-black/60 rounded-3xl px-4 py-1 text-xs font-mono border border-cyan-400/50">
                    <span class="live-dot w-2 h-2 bg-emerald-400 rounded-full mr-2 animate-pulse"></span>
                    LIVE • SWARM ACTIVE
                </div>
                <button onclick="runSwarm()" class="bg-gradient-to-r from-cyan-500 to-purple-600 px-6 py-2 rounded-3xl font-bold text-sm hover:scale-105 transition">RUN SWARM</button>
            </div>
        </div>
    </header>

    <!-- HAMBURGER MENU (unchanged) -->
    <div id="hamburgerMenu" class="hidden md:hidden fixed inset-0 bg-black/95 z-50 flex flex-col p-8 text-3xl font-medium">
        <!-- ... your existing hamburger content unchanged ... -->
    </div>

    <div class="max-w-screen-2xl mx-auto px-6 py-8">
        <!-- All your rooms remain visually identical -->
        <!-- SUMMARY ROOM -->
        <div id="room-0" class="room-content active-room">
            <h2 class="text-5xl font-bold logo-font mb-8">GLOBAL SUMMARY • LIVE</h2>
            <div id="ticker" class="ticker bg-black/70 border border-cyan-400/30 rounded-3xl p-4 text-cyan-300 font-mono mb-8"></div>
            <div id="summary-headlines" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <!-- MARKET MOVERS (numbers stay fixed layout) -->
        <div id="room-4" class="room-content">
            <h2 class="text-5xl font-bold logo-font mb-4">MARKET MOVERS • AI SWARM PREDICTIONS</h2>
            <p class="text-cyan-300 mb-8 text-sm">15-source swarm consensus • 20+ live panels • Last updated: <span id="last-updated"></span></p>
            <div id="market-data" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
        </div>

        <!-- Other rooms (press, conspiracy, etc.) stay exactly as you had them -->
        <!-- ... (full rooms omitted here for brevity - they are unchanged) ... -->
    </div>

    <script>
        let headlinesCache = [];
        let marketData = [];
        let lastUpdated = "";

        async function loadDashboardData() {
            try {
                const res = await fetch('data/dashboard-data.json?' + Date.now()); // bypass cache
                const data = await res.json();
                
                headlinesCache = data.headlines || [];
                marketData = data.marketData || [];
                lastUpdated = data.last_updated || new Date().toISOString();

                document.getElementById("last-updated").textContent = new Date(lastUpdated).toLocaleTimeString();
                
                renderAllRooms();
                console.log("✅ Loaded fresh AI swarm data");
            } catch(e) {
                console.warn("Using fallback data", e);
                // fallback to your original simulation
                headlinesCache = [{title: "Palantir wins $2.4B DoD contract", source: "infowars"}, {title: "JD Vance meets with Kushner family", source: "reuters"}];
                renderAllRooms();
            }
        }

        function renderMarket() {
            const container = document.getElementById("market-data");
            container.innerHTML = marketData.map(m => {
                const isPositive = m.change >= 0;
                const changeClass = isPositive ? 'text-emerald-400' : 'text-red-400';
                const changePrefix = isPositive ? '+' : '';
                const predClass = m.prediction === 'Bullish' ? 'text-emerald-400' : m.prediction === 'Bearish' ? 'text-red-400' : 'text-amber-400';
                return `
                <div class="market-card bg-black/70 rounded-3xl p-5 border border-cyan-400/30 hover:border-cyan-400/70">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-mono text-3xl tracking-[-1px]">${m.symbol}</div>
                            <div class="text-xs text-cyan-300/90">${m.name}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-mono text-xl">$${Number(m.price).toLocaleString()}</div>
                            <div class="${changeClass} text-xl font-medium">${changePrefix}${m.change}%</div>
                        </div>
                    </div>
                    <div class="mt-6 grid grid-cols-2 gap-4 text-xs border-t border-cyan-400/10 pt-4">
                        <div><div class="text-cyan-300/70">PREDICTION</div><div class="${predClass} font-semibold">${m.prediction}</div></div>
                        <div class="text-right"><div class="text-cyan-300/70">CONFIDENCE</div><div class="font-mono">${m.confidence}<span class="text-xs text-cyan-400/40">%</span></div></div>
                    </div>
                    <div class="mt-4 text-[10px] leading-tight text-gray-400">${m.reason}</div>
                </div>`;
            }).join('');
        }

        function renderAllRooms() {
            // Ticker + Summary + Press + Conspiracy (using headlinesCache)
            document.getElementById("ticker").innerHTML = headlinesCache.slice(0,12).map(h => 
                `<span class="inline-block mr-8">${h.source?.toUpperCase() || 'NEWS'}: ${h.title}</span>`
            ).join('');

            document.getElementById("summary-headlines").innerHTML = headlinesCache.slice(0,6).map(h => 
                `<div class="article-card bg-black/70 rounded-3xl p-5 text-sm">${h.source?.toUpperCase() || ''}<br><a href="${h.link}" target="_blank" class="text-cyan-300">${h.title}</a></div>`
            ).join("");

            // Add similar updates for press-articles, conspiracy-content if desired
            renderMarket();
        }

        // Keep all your existing functions (selectRoom, runSwarm, etc.) unchanged
        // ... paste the rest of your original <script> here ...

        function launchNexus() {
            loadDashboardData();           // ← new main load
            // your other init calls...
            console.log('%c✅ NEXUS OS LIVE — AI Swarm Connected', 'color:#00f0ff;font-size:18px');
        }

        window.onload = launchNexus;
    </script>
</body>
</html>
